openapi: 3.0.0
info:
  title: Taxpal API Documentation
  description: API endpoints for the Taxpal full-stack application, focusing on Budget Management.
  version: 1.0.0
servers:
  - url: /api
    description: Primary API endpoint
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Budget:
      type: object
      required:
        - category
        - amount
        - month
      properties:
        id:
          type: integer
          description: Unique identifier for the budget (generated by DB).
          example: 101
        category:
          type: string
          description: The spending category (e.g., Groceries, Rent, Entertainment).
          example: 'Groceries'
        amount:
          type: number
          format: float
          description: The target budget amount for the month.
          example: 500.50
        month:
          type: string
          format: date-time
          description: The month and year the budget applies to.
          example: '2025-09-01T00:00:00.000Z'
        description:
          type: string
          description: Optional description or notes for the budget.
          example: 'Monthly food spending limit'
        userId:
          type: integer
          description: The ID of the user who owns this budget (set by middleware).
          example: 1
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: 'Error creating budget'

paths:
  /budget:
    post:
      tags:
        - Budget Management
      summary: Create a new budget
      description: Creates a new budget entry for the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - category
                - amount
                - month
              properties:
                category:
                  type: string
                  example: 'Rent'
                amount:
                  type: number
                  example: 1200
                month:
                  type: string
                  format: date-time
                  example: '2025-10-01T00:00:00.000Z'
                description:
                  type: string
                  example: 'Rent payment'
      responses:
        '201':
          description: Budget created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
        '401':
          description: Unauthorized (Missing or invalid token)
        '500':
          description: Server error
    get:
      tags:
        - Budget Management
      summary: Get all budgets for the authenticated user
      description: Retrieves all budget entries associated with the authenticated user's ID.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of budgets retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Budget'
        '401':
          description: Unauthorized
        '500':
          description: Server error

  /budget/{id}:
    parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
        description: The unique ID of the budget item.
    put:
      tags:
        - Budget Management
      summary: Update an existing budget
      description: Updates the details of a specific budget item by ID.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category:
                  type: string
                  example: 'Utilities'
                amount:
                  type: number
                  example: 150
      responses:
        '200':
          description: Budget updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
        '401':
          description: Unauthorized
        '404':
          description: Budget not found
        '500':
          description: Server error
    delete:
      tags:
        - Budget Management
      summary: Delete a budget
      description: Deletes a specific budget item by ID.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Budget deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Budget'
        '401':
          description: Unauthorized
        '404':
          description: Budget not found
        '500':
          description: Server error
