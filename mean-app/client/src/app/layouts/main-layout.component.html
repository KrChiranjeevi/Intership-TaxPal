<div class="dashboard">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h1 class="logo">TaxPal</h1>
    <ul class="menu">
      <li routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</li>
      <li>Transactions</li>
      <li routerLink="/budget" routerLinkActive="active">Budget</li>
      <li>Tax Estimation</li>
      <li>Reports</li>
    </ul>
    <div class="bottom-links">
      <div class="settings">⚙️ Settings</div>
      <div class="logout" (click)="onLogout()">↩ Logout</div>
    </div>
  </aside>

  <!-- Main content -->
  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
