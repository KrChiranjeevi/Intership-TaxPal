   <div class="container">
  <h2>TaxPal</h2>
  <p>Sign in to your account to continue</p>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="form">
      <label for="email">Email</label>
      <input type="email" formControlName="email" placeholder="Enter your email" required autocomplete="off">
      <!-- <img class="icon" src="user.svg" alt=""> -->
    </div>

    <div class="form">
      <label for="password">
        Password <a routerLink="/forgot-password" class="forgot">Forgot password?</a>
      </label>
      <input type="password" formControlName="password" placeholder="Enter your password" required autocomplete="new-password">
      <img class="icon" src="lock.svg" alt="">
    </div>

    <button class="btn" type="submit">Sign in</button>
  </form>

  <div class="demo">
    <!--<p>Demo account: <b>demo / password</b></p>-->
    <p>Don’t have an account? <a routerLink="/signup">Sign up</a></p>
  </div>

  <footer>© 2025 TaxPal. All rights reserved.</footer>

</div>
