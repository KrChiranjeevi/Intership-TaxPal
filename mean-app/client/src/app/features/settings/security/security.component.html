<div class="security-card">
  <h3><span class="icon">🔒</span> Security Settings</h3>
  <form>
    <div class="form-row">

      <div class="form-group full-width">
        <label for="currentPassword">Current Password</label>
        <input type="password" id="currentPassword" class="text-input" />
      </div>

      <div class="form-group full-width">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" class="text-input" />
      </div>

      <div class="form-group full-width">
        <label for="confirmPassword">Confirm New Password</label>
        <input type="password" id="confirmPassword" class="text-input" />
      </div>

      <button type="submit" class="save-btn">Update Password</button>
    </div>
  </form>

  <!-- Divider Line -->
  <div class="divider"></div>

  <!-- Two Factor Authentication -->
  <div class="form-group toggle-group">
    <div class="label-description">
      <label for="twoFactorAuth">Two-Factor Authentication</label>
      <p class="description-text">Add an extra layer of security to your account</p>
    </div>
    <label class="switch">
      <input type="checkbox" id="twoFactorAuth" />
      <span class="slider round"></span>
    </label>
  </div>
</div>
