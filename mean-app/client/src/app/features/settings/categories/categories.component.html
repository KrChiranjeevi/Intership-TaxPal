<div class="settings-panel categories-page animate-fade-up">
  <div class="panel-header">
    <div class="header-icon material-icons-round">category</div>
    <div class="header-text">
      <h3>Category Management</h3>
      <p>Organize your financial tracking tags.</p>
    </div>
  </div>

  <!-- Horizontal sub-nav -->
  <nav class="categories-nav">
    <button (click)="switchTab('expense')" [class.active]="activeTab === 'expense'" class="subnav-btn">
      <span class="material-icons-round">arrow_downward</span> Expense Categories
    </button>
    <button (click)="switchTab('income')" [class.active]="activeTab === 'income'" class="subnav-btn">
      <span class="material-icons-round">arrow_upward</span> Income Categories
    </button>
  </nav>

  <!-- Category list -->
  <div class="category-list-glass">
    <div class="cat-row animate-fade-up" *ngFor="let category of categories; let i = index" [style.animation-delay]="(i * 0.05) + 's'">
      <div class="cat-left">
        <span class="cat-dot" [style.background]="category.color"></span>
        <span class="cat-name">{{ category.name }}</span>
      </div>

      <div class="cat-actions">
        <button class="action-btn edit-btn" (click)="editCategory(i)" title="Edit">
          <span class="material-icons-round">edit</span>
        </button>
        <button class="action-btn delete-btn" (click)="deleteCategory(i)" title="Delete">
          <span class="material-icons-round">delete_outline</span>
        </button>
      </div>
    </div>

    <div class="cat-empty-state" *ngIf="!categories.length">
      <span class="material-icons-round empty-icon">folder_off</span>
      <p>No categories found.</p>
    </div>

    <button class="add-category-btn btn-ghost" (click)="addCategory()">
      <span class="material-icons-round">add</span>
      Add New {{ activeTab === 'expense' ? 'Expense' : 'Income' }} Category
    </button>
  </div>
</div>
